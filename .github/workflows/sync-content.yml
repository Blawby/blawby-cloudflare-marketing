# .github/workflows/sync-content.yml
name: Sync content to R2

on:
  push:
    branches: [main]
    paths:
      - "src/data/**/*.mdx" # only runs when content actually changes

concurrency:
  group: "sync-content-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/sync-content-to-r2.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_CONTENT_BUCKET: blawby-content

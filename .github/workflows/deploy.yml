name: Deploy to Cloudflare Pages and Worker

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js site
        run: pnpm run build

      - name: Upload MDX content to R2 for AI Search
        env:
          R2_CONTENT_BUCKET: ${{ vars.R2_CONTENT_BUCKET }}
        run: pnpm run r2:upload-content

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy out --project-name=blawby-cloudflare-marketing

      - name: Deploy Worker
        run: pnpm exec wrangler deploy
